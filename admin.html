<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin — Chá de Casa Nova</title>
    <meta name="robots" content="noindex" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="style.css" />
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔑</text></svg>" />
</head>

<body>

    <!-- Login Overlay (reused for admin auth) -->
    <div id="login-overlay">
        <div class="hero-ornament hero-ornament--top"></div>
        <p class="hero-tag">Área Restrita</p>
        <h1 class="login-logo">Administração</h1>
        <p class="login-sub">
            Acesso exclusivo para administradores.<br />
            Entre com a conta autorizada do Google.
        </p>
        <button class="btn-google" id="btn-login">
            <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                <path fill="#EA4335"
                    d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z" />
                <path fill="#4285F4"
                    d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z" />
                <path fill="#FBBC05"
                    d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z" />
                <path fill="#34A853"
                    d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z" />
            </svg>
            Entrar com Google
        </button>
    </div>

    <!-- Admin App -->
    <div id="admin-app" style="display:none; min-height:100vh; background:var(--bg);">
        <!-- Sticky top bar -->
        <div id="user-bar" class="hidden">
            <img class="user-avatar" id="user-avatar" src="" alt="Foto" />
            <span class="user-name" id="user-name">…</span>
            <a href="index.html"
                style="font-size:.78rem; color:var(--text-muted); text-decoration:none; margin-right:.5rem;">←
                Voltar</a>
            <button class="btn-signout" id="btn-signout">Sair</button>
        </div>

        <div class="admin-wrapper">
            <!-- Header -->
            <div class="admin-header">
                <div class="admin-title">
                    <small>Painel de Administração</small>
                    Chá de Casa Nova
                </div>
                <div id="admin-stats" style="font-size:.82rem; color:var(--text-muted);"></div>
            </div>

            <!-- Gifts Panel -->
            <div class="admin-card">
                <div class="admin-card-header">
                    <span class="admin-card-title">🎁 Presentes</span>
                    <div>
                        <span class="admin-badge" id="gifts-badge" style="margin-right:8px;">—</span>
                        <button class="btn-choose" id="btn-add-gift"
                            style="font-size:.75rem; padding:.3rem .8rem; min-height:auto;">+ Novo</button>
                    </div>
                </div>
                <div style="overflow-x:auto;">
                    <table class="gift-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Item</th>
                                <th>Status</th>
                                <th>Escolhido por</th>
                                <th>Observação</th>
                                <th style="text-align:right;">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="gifts-tbody">
                            <tr>
                                <td colspan="5">
                                    <div class="spinner"></div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Messages Panel -->
            <div class="admin-card">
                <div class="admin-card-header">
                    <span class="admin-card-title">💬 Mural de Recados</span>
                    <span class="admin-badge" id="msgs-badge">—</span>
                </div>
                <div class="msg-list" id="msgs-list">
                    <div class="spinner"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Gift Modal -->
    <div id="gift-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h2 id="gift-modal-title">Novo Presente</h2>
            <form id="gift-form">
                <input type="hidden" id="gift-id" />
                <div style="margin-bottom:1rem; text-align:left;">
                    <label style="display:block; font-size:.8rem; margin-bottom:.3rem; color:var(--text-muted);">Ícone
                        (Emoji)</label>
                    <input type="text" id="gift-icon" class="gift-custom-input" placeholder="Ex: 📦" required />
                </div>
                <div style="margin-bottom:1.5rem; text-align:left;">
                    <label style="display:block; font-size:.8rem; margin-bottom:.3rem; color:var(--text-muted);">Nome do
                        Item</label>
                    <input type="text" id="gift-name" class="gift-custom-input" placeholder="Ex: Micro-ondas"
                        required />
                </div>
                <div style="display:flex; justify-content:flex-end; gap:.5rem;">
                    <button type="button" class="btn-swap" id="btn-close-modal"
                        style="flex:none; padding:.4rem .8rem; min-height:auto;">Cancelar</button>
                    <button type="submit" class="btn-choose" id="btn-save-gift"
                        style="flex:none; padding:.4rem .8rem; min-height:auto;">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast"></div>

    <script type="module" src="admin.js"></script>
</body>

</html>
